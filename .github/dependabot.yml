# Dependabot configuration.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Weekly cadence is intentional — daily PR noise outweighs the value for
# a small API-only service. Security advisories are exempt from the
# schedule and land as soon as Dependabot picks them up.

version: 2
updates:
  # Application dependencies (npm)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Group non-major bumps into a single PR per week to keep review
    # overhead bounded. Major bumps still come as individual PRs so
    # each one gets a deliberate review.
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    # ESLint v10 fans out across @eslint/js + eslint + the typescript-eslint
    # ecosystem; bumping any one of them solo always ERESOLVEs against the
    # others until the whole stack catches up. We hit this on Dependabot
    # PR #26 (@eslint/js 10.0.1, Vercel build ERESOLVE). Defer the major
    # bumps until typescript-eslint ships a v10-compatible release; lift
    # the ignore once the lockfile can resolve them together.
    ignore:
      - dependency-name: eslint
        update-types: [version-update:semver-major]
      - dependency-name: "@eslint/js"
        update-types: [version-update:semver-major]
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(dev-deps)
      include: scope

  # GitHub Actions used in .github/workflows/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
      include: scope
