name: Warm Cache (manual)

# Manual one-click trigger from the GitHub Actions UI.
# Calls the CacheWarmer Vercel deployment directly via its HTTP API.
# The service also runs automatically twice daily via Vercel Cron (06:00 + 18:00 UTC).
#
# Required repository secret: CACHEWARMER_API_KEY
# Required repository variable: CACHEWARMER_URL (e.g. https://trade-aero-cachewarmer.vercel.app)

on:
  workflow_dispatch:
    inputs:
      sitemap_url:
        description: 'Sitemap URL (leave blank to use SITEMAP_URL from Vercel env)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — health-check only, do not enqueue a job'
        required: false
        type: boolean
        default: false

jobs:
  warm:
    name: Trigger warm run
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Health check
        env:
          CACHEWARMER_URL: ${{ vars.CACHEWARMER_URL }}
        run: |
          RESPONSE=$(curl -sf "$CACHEWARMER_URL/api/health" || echo '{"ok":false}')
          echo "Health: $RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || (echo "::error::CacheWarmer not reachable at $CACHEWARMER_URL" && exit 1)

      - name: Dry run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run — service is healthy, no job enqueued."

      - name: Submit warming job
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CACHEWARMER_URL: ${{ vars.CACHEWARMER_URL }}
          CACHEWARMER_API_KEY: ${{ secrets.CACHEWARMER_API_KEY }}
        run: |
          SITEMAP="${{ github.event.inputs.sitemap_url }}"

          if [ -z "$SITEMAP" ]; then
            BODY='{}'
          else
            BODY="{\"sitemapUrl\": \"$SITEMAP\"}"
          fi

          echo "Submitting job (body: $BODY)"
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "$CACHEWARMER_URL/api/jobs" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CACHEWARMER_API_KEY" \
            -d "$BODY")

          RESULT=$(cat /tmp/response.json)
          echo "HTTP $HTTP_CODE"
          echo "Response: $RESULT"

          [ "$HTTP_CODE" = "200" ] || (echo "::error::Job submission failed (HTTP $HTTP_CODE): $RESULT" && exit 1)
